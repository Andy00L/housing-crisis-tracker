name: legislation-sync

# Weekly sync of housing legislation from LEGISinfo (Canada federal),
# BC Laws (BC provincial), LegiScan (US), UK Parliament Bills API.

on:
  schedule:
    - cron: "0 7 * * 3" # Every Wednesday at 7:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    concurrency:
      group: legislation-sync
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci --no-audit --no-fund

      # ── Canada federal ──────────────────────────────────────────
      - name: Canada federal (LEGISinfo)
        run: npx tsx scripts/sync/canada-legislation.ts

      # ── Canada provincial (BC) ──────────────────────────────────
      - name: BC provincial (BC Laws)
        run: npx tsx scripts/sync/bc-legislation.ts

      # ── USA (LegiScan) ──────────────────────────────────────────
      - name: US legislation ingest (LegiScan)
        env:
          LEGISCAN_API_KEY: ${{ secrets.LEGISCAN_API_KEY }}
        run: npx tsx scripts/sync/legislation-ingest.ts

      - name: US legislation classify
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx tsx scripts/sync/legislation-classify.ts

      # ── UK ──────────────────────────────────────────────────────
      - name: UK Bills (Parliament API)
        run: npx tsx scripts/sync/uk-bills.ts

      # ── Rebuild placeholder data ────────────────────────────────
      - name: Rebuild placeholder
        run: npx tsx scripts/build-placeholder.ts

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain data/ lib/placeholder-data.ts)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/legislation/ data/raw/ lib/placeholder-data.ts
            git commit -m "legislation: weekly sync $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          else
            echo "No changes."
          fi

      - name: Summarize run report
        if: always()
        run: npx tsx scripts/ci/summarize-run-report.ts
