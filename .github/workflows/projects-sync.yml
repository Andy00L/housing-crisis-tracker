name: projects-sync

# Weekly sync of Canadian housing projects from Build Canada Homes, CMHC,
# and provincial sources via Tavily. Writes data/projects/canada.json and
# rebuilds lib/placeholder-data.ts so the UI picks up new projects.

on:
  schedule:
    - cron: "0 8 * * 2" # Every Tuesday at 08:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    concurrency:
      group: projects-sync
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci --no-audit --no-fund

      - name: Canadian housing projects (Tavily research)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: npx tsx scripts/sync/housing-projects.ts

      - name: US housing projects (Tavily research)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: npx tsx scripts/sync/us-housing-projects.ts

      - name: Rebuild placeholder
        run: npx tsx scripts/build-placeholder.ts

      - name: Build
        run: npm run build

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain data/ lib/placeholder-data.ts)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/projects/ data/raw/_run-reports/ lib/placeholder-data.ts
            git commit -m "projects: weekly sync $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          else
            echo "No changes."
          fi

      - name: Summarize run report
        if: always()
        run: npx tsx scripts/ci/summarize-run-report.ts
